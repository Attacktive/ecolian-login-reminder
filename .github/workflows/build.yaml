name: 'Build'
on:
  push:
    branches: ['main']
  pull_request:
    branches: ['main']
jobs:
  build:
    runs-on: 'ubuntu-latest'
    steps:
      - uses: 'actions/checkout@v7'
      - name: 'Install Bun'
        uses: 'oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6'
        with:
          bun-version: 'latest'
      - run: 'bun install --frozen-lockfile'
      - run: 'bun run build'
